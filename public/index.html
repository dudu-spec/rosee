<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Rosee | Automação Instagram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

@keyframes fadeIn{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
@keyframes slideUp{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(139,92,246,.15)}50%{box-shadow:0 0 40px rgba(139,92,246,.3)}}
@keyframes gradient-shift{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes border-glow{0%,100%{border-color:rgba(139,92,246,.2)}50%{border-color:rgba(139,92,246,.5)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(-100%);opacity:0}}

body{background:#0a0a0f;color:#e4e4ed;font-family:'Inter',sans-serif;min-height:100vh;display:flex;overflow-x:hidden}

/* ── Menu Toggle (Hamburger) ── */
.menu-toggle{display:none;position:fixed;top:16px;left:16px;z-index:200;width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(15,15,25,.9);backdrop-filter:blur(12px);cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:4px;transition:.2s}
.menu-toggle span{display:block;width:18px;height:2px;background:rgba(255,255,255,.7);border-radius:2px;transition:.3s}
.menu-toggle.active span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
.menu-toggle.active span:nth-child(2){opacity:0}
.menu-toggle.active span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}

/* ── Sidebar ── */
.sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,rgba(15,15,25,.98),rgba(20,10,40,.98));border-right:1px solid rgba(139,92,246,.12);padding:24px 16px;position:fixed;left:0;top:0;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(139,92,246,.4),transparent)}
.sidebar-logo{text-align:center;padding:20px 0 24px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-logo .icon{font-size:40px;margin-bottom:4px}
.sidebar-logo h1{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.5px}
.sidebar-logo p{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.nav-item{padding:12px 16px;border-radius:12px;margin:4px 0;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:12px;font-size:14px;font-weight:500;color:rgba(255,255,255,.6);position:relative;overflow:hidden}
.nav-item::before{content:'';position:absolute;left:0;top:50%;width:3px;height:0;background:linear-gradient(180deg,#8B5CF6,#EC4899);border-radius:0 2px 2px 0;transition:height .3s cubic-bezier(.4,0,.2,1);transform:translateY(-50%)}
.nav-item:hover{background:rgba(139,92,246,.08);color:#fff;transform:translateX(4px)}
.nav-item:hover::before{height:60%}
.nav-item.active{background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(236,72,153,.08));color:#8B5CF6;font-weight:600;border:1px solid rgba(139,92,246,.12)}
.nav-item.active::before{height:60%}
.sidebar-footer{margin-top:auto;padding-top:24px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;color:rgba(255,255,255,.25);text-align:center}

/* ── Sidebar overlay (mobile) ── */
.sidebar-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:99;display:none;animation:fadeIn .2s}

/* ── Main ── */
.main{margin-left:240px;flex:1;padding:32px 40px;max-width:1200px;min-height:100vh;transition:margin-left .3s cubic-bezier(.4,0,.2,1)}

/* ── Titles ── */
.page-title{font-size:28px;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#f0f0ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fadeIn .4s ease}
.page-subtitle{font-size:14px;color:rgba(255,255,255,.4);margin-bottom:24px;animation:fadeIn .4s ease .1s both}

/* ── Cards ── */
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px;margin-bottom:16px;backdrop-filter:blur(20px);transition:all .4s cubic-bezier(.4,0,.2,1);animation:fadeIn .5s ease both;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(139,92,246,.6),transparent);transition:left .6s cubic-bezier(.4,0,.2,1)}
.card:hover::before{left:100%}
.card:hover{border-color:rgba(139,92,246,.2);box-shadow:0 8px 40px rgba(0,0,0,.3),0 0 30px rgba(139,92,246,.05);transform:translateY(-4px)}
.card h3{font-size:16px;font-weight:600;margin-bottom:16px;color:#e4e4ed}
.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.2s}
.card:nth-child(4){animation-delay:.3s}

.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.badge-revisao{background:rgba(255,193,7,.12);color:#ffc107;box-shadow:0 0 12px rgba(255,193,7,.08)}
.badge-agendado{background:rgba(33,150,243,.12);color:#2196f3;box-shadow:0 0 12px rgba(33,150,243,.08)}
.badge-publicado{background:rgba(76,175,80,.12);color:#4caf50;box-shadow:0 0 12px rgba(76,175,80,.08)}
.badge-falha{background:rgba(233,30,99,.12);color:#e91e63;box-shadow:0 0 12px rgba(233,30,99,.08)}
.badge-rascunho{background:rgba(158,158,158,.12);color:#9e9e9e}

input,textarea,select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#e4e4ed;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:all .3s;margin-bottom:12px}
input:focus,textarea:focus,select:focus{border-color:#8B5CF6;box-shadow:0 0 0 3px rgba(139,92,246,.1),0 0 20px rgba(139,92,246,.05)}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.2)}
textarea{resize:vertical;min-height:60px}
label{font-size:13px;font-weight:500;color:rgba(255,255,255,.6);display:block;margin-bottom:4px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.btn-primary{background:linear-gradient(135deg,#8B5CF6,#EC4899);background-size:200% 200%;animation:gradient-shift 4s ease infinite;color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 24px rgba(139,92,246,.4)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:rgba(255,255,255,.04);color:#a78bfa;border:1px solid rgba(139,92,246,.2)}
.btn-secondary:hover{border-color:rgba(139,92,246,.5);background:rgba(139,92,246,.08);box-shadow:0 0 20px rgba(139,92,246,.05)}
.btn-danger{background:rgba(233,30,99,.15);color:#e91e63}
.btn-danger:hover{background:rgba(233,30,99,.25)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;animation:none!important}

.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}

.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.revisao{background:#ffc107;box-shadow:0 0 8px rgba(255,193,7,.3)}
.status-dot.agendado{background:#2196f3;box-shadow:0 0 8px rgba(33,150,243,.3)}
.status-dot.publicado{background:#4caf50;box-shadow:0 0 8px rgba(76,175,80,.3)}
.status-dot.falha{background:#e91e63;box-shadow:0 0 8px rgba(233,30,99,.3)}

.empty-state{text-align:center;padding:40px 0;color:rgba(255,255,255,.25)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.hidden{display:none!important}
.loading{display:flex;align-items:center;justify-content:center;padding:60px}
.spinner{width:32px;height:32px;border:3px solid rgba(139,92,246,.15);border-top-color:#8B5CF6;border-radius:50%;animation:spin .8s linear infinite}

.toast{position:fixed;top:24px;right:24px;padding:14px 24px;border-radius:12px;font-size:14px;z-index:9999;animation:slideIn .3s;max-width:400px}
.toast.success{background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.3);color:#4caf50}
.toast.error{background:rgba(233,30,99,.15);border:1px solid rgba(233,30,99,.3);color:#e91e63}
.toast.info{background:rgba(33,150,243,.15);border:1px solid rgba(33,150,243,.3);color:#2196f3}

.post-card{padding:16px;margin-bottom:12px;cursor:pointer}
.post-card .post-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.post-card .post-title{font-size:14px;font-weight:500;flex:1;margin:0 12px}
.post-card .post-meta{font-size:12px;color:rgba(255,255,255,.4)}
.preview-img{max-width:100%;max-height:300px;border-radius:12px;margin:12px 0}

.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:0;overflow-x:auto}
.tab{padding:10px 20px;cursor:pointer;border-radius:10px 10px 0 0;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);transition:.2s;border-bottom:2px solid transparent;white-space:nowrap}
.tab:hover{color:#e4e4ed;background:rgba(255,255,255,.03)}
.tab.active{color:#8B5CF6;border-bottom-color:#8B5CF6;background:rgba(139,92,246,.05)}

.tag{display:inline-block;padding:2px 8px;border-radius:6px;background:rgba(139,92,246,.1);color:#8B5CF6;font-size:11px;margin:2px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,.02)}
::-webkit-scrollbar-thumb{background:rgba(139,92,246,.3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(139,92,246,.5)}

/* ── Divider gradiente ── */
.divider{height:1px;background:linear-gradient(90deg,rgba(139,92,246,.4),rgba(236,72,153,.2),transparent);margin:16px 0 24px}

/* ── Mobile ── */
@media(max-width:768px){
  .menu-toggle{display:flex}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0;padding:24px 16px;padding-top:72px}
  .page-title{font-size:22px}
  .card{padding:16px;border-radius:14px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab{padding:8px 14px;font-size:12px}
  .toast{left:16px;right:16px;max-width:none}
}

@media(max-width:480px){
  .main{padding:16px 12px;padding-top:68px}
  .page-title{font-size:20px}
  .card{padding:14px;border-radius:12px}
  .btn{padding:8px 16px;font-size:13px}
}
</style>
</head>
<body>

<div class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="icon">🌸</div>
    <h1>Rosee</h1>
    <p>Instagram Automation</p>
  </div>
  <div style="margin-top:24px">
    <div class="nav-item active" onclick="navigate('upload')" id="nav-upload">📤 Upload</div>
    <div class="nav-item" onclick="navigate('review')" id="nav-review">✏️ Revisão</div>
    <div class="nav-item" onclick="navigate('schedule')" id="nav-schedule">📅 Agenda</div>
    <div class="nav-item" onclick="navigate('published')" id="nav-published">✅ Publicados</div>
    <div class="nav-item" onclick="navigate('settings')" id="nav-settings">⚙️ Config</div>
  </div>
  <div class="sidebar-footer">
    AI: <span id="ai-status">—</span>
  </div>
</div>

<div class="main" id="main">
  <div id="page-upload"></div>
  <div id="page-review" class="hidden"></div>
  <div id="page-schedule" class="hidden"></div>
  <div id="page-published" class="hidden"></div>
  <div id="page-settings" class="hidden"></div>
</div>

<script>
const API = window.location.origin;

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
  document.getElementById('menuToggle').classList.toggle('active');
}

function closeSidebar() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
    document.getElementById('menuToggle').classList.remove('active');
  }
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;').replace(/`/g,'&#96;').replace(/\${/g,'&#36;&#123;'); }

function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

async function api(url, opts={}) {
  try {
    const res = await fetch(API + url, { ...opts, headers: { ...opts.headers, 'Accept': 'application/json' } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || data.message || JSON.stringify(data));
    return data;
  } catch(e) {
    if (e.message.includes('Failed to fetch')) throw new Error('Backend offline');
    throw e;
  }
}

async function apiUpload(url, formData) {
  try {
    const res = await fetch(API + url, { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
    return data;
  } catch(e) {
    if (e.message.includes('Failed to fetch')) throw new Error('Backend offline');
    throw e;
  }
}

function navigate(page) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-' + page).classList.add('active');
  document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
  document.getElementById('page-' + page).classList.remove('hidden');
  closeSidebar();
  if (page === 'upload') renderUpload();
  if (page === 'review') renderReview();
  if (page === 'schedule') renderSchedule();
  if (page === 'published') renderPublished();
  if (page === 'settings') renderSettings();
}

async function init() {
  try {
    const s = await api('/api/posts/ai-status');
    document.getElementById('ai-status').textContent = s.using_cloud_ai ? '☁️ Nuvem' : '💻 Local';
  } catch(e) {
    document.getElementById('ai-status').textContent = '❌ Offline';
  }
  renderUpload();
}
init();

// ───── Upload Page ─────
function renderUpload() {
  const el = document.getElementById('page-upload');
  el.innerHTML = `
    <div class="page-title">📤 Criar Postagem</div>
    <div class="page-subtitle">Envie a foto e veja a IA gerar descrição e legenda automaticamente</div>
    <div class="grid grid-2">
      <div>
        <div class="card">
          <h3>📸 Foto</h3>
          <input type="file" id="upload-file" accept="image/*" onchange="previewFile(event)">
          <img id="upload-preview" class="preview-img hidden" />
          <label>Descrição (opcional)</label>
          <textarea id="upload-input" placeholder="Ex: Vestido novo verão 2026, tecido leve"></textarea>
          <div class="grid grid-2">
            <div>
              <label>Preço (R$)</label>
              <input type="number" id="upload-price" step="0.01" min="0" placeholder="89,90">
            </div>
            <div>
              <label>Tamanhos</label>
              <input type="text" id="upload-sizes" placeholder="P, M, G">
            </div>
          </div>
          <label>Agendar para (opcional)</label>
          <input type="datetime-local" id="upload-schedule">
          <button class="btn btn-primary" onclick="uploadPost()" id="upload-btn">🚀 Analisar com IA</button>
        </div>
      </div>
      <div>
        <div class="card" id="upload-result">
          <h3>🤖 Resultado da IA</h3>
          <div class="empty-state"><div class="icon">✨</div>Envie uma foto para ver a análise</div>
        </div>
      </div>
    </div>
  `;
}

function previewFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = document.getElementById('upload-preview');
    img.src = ev.target.result;
    img.classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}

async function uploadPost() {
  const file = document.getElementById('upload-file').files[0];
  if (!file) { toast('Selecione uma foto', 'error'); return; }
  const btn = document.getElementById('upload-btn');
  btn.disabled = true; btn.textContent = '⏳ Analisando...';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('user_input', document.getElementById('upload-input').value);
  fd.append('price', document.getElementById('upload-price').value || '');
  fd.append('sizes', document.getElementById('upload-sizes').value);
  const sched = document.getElementById('upload-schedule').value;
  if (sched) {
    const dt = new Date(sched);
    const iso = dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0') + 'T' + String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0') + ':00-03:00';
    fd.append('scheduled_at', iso);
  }
  try {
    const post = await apiUpload('/api/posts/upload', fd);
    showUploadResult(post);
    toast(post.status === 'agendado' ? '✅ Foto analisada e agendada!' : '✅ Foto analisada com sucesso!', 'success');
  } catch(e) {
    toast('Erro: ' + e.message, 'error');
  }
  btn.disabled = false; btn.textContent = '🚀 Analisar com IA';
}

function showUploadResult(post) {
  const el = document.getElementById('upload-result');
  el.innerHTML = `
    <h3>🤖 Resultado da IA</h3>
    <div style="margin-bottom:12px">
      <div class="badge badge-revisao">Revisão</div>
      <div style="margin-top:8px;font-size:13px;color:rgba(255,255,255,.6);line-height:1.5">${esc(post.ai_description)}</div>
    </div>
    <div style="background:rgba(255,255,255,.03);border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px">📝 Legenda</div>
      <div style="font-size:13px;color:rgba(255,255,255,.7);line-height:1.5">${esc(post.ai_caption)}</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      ${(post.ai_hashtags || '').split(',').filter(Boolean).map(t => `<span class="tag">${esc(t.trim())}</span>`).join('')}
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,.4)">CTA: ${esc(post.ai_cta)}</div>
    <hr style="border:none;border-top:1px solid rgba(255,255,255,.06);margin:16px 0">
    <button class="btn btn-primary btn-sm" onclick="navigate(post.status === 'agendado' ? 'schedule' : 'review')">${post.status === 'agendado' ? '📅 Ir para Agenda' : '✏️ Ir para Revisão'}</button>
  `;
}

// ───── Review Page ─────
let currentPostId = null;

async function renderReview() {
  const el = document.getElementById('page-review');
  if (currentPostId) { renderPostDetail(currentPostId); return; }
  el.innerHTML = `<div class="page-title">✏️ Revisão</div><div class="page-subtitle">Posts aguardando sua aprovação</div><div class="loading"><div class="spinner"></div></div>`;
  try {
    const data = await api('/api/posts/?status=revisao');
    const posts = data.posts || [];
    if (!posts.length) {
      el.innerHTML = `<div class="page-title">✏️ Revisão</div><div class="page-subtitle">Posts aguardando sua aprovação</div><div class="empty-state"><div class="icon">✅</div>Nenhum post pendente de revisão</div>`;
      return;
    }
    let html = `<div class="page-title">✏️ Revisão</div><div class="page-subtitle">${posts.length} post(s) aguardando revisão</div>`;
    posts.forEach(p => {
      const date = p.created_at ? new Date(p.created_at).toLocaleString('pt-BR') : '';
      html += `<div class="card post-card" onclick="renderPostDetail('${esc(p.id)}')">
        <div class="post-header">
          <span class="status-dot revisao"></span>
          <span class="post-title">${esc((p.ai_caption || '').substring(0, 60))}...</span>
          <span class="badge badge-revisao">Revisão</span>
        </div>
        <div class="post-meta">${date} ${p.price ? '· R$ ' + p.price.toFixed(2) : ''} ${p.sizes ? '· ' + esc(p.sizes) : ''}</div>
      </div>`;
    });
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div class="page-title">✏️ Revisão</div><div class="empty-state"><div class="icon">❌</div>Erro: ${esc(e.message)}</div>`;
  }
}

async function renderPostDetail(postId) {
  currentPostId = postId;
  const el = document.getElementById('page-review');
  el.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  try {
    const post = await api('/api/posts/' + postId);
    const escPost = (v) => esc(v);
    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <button class="btn btn-secondary btn-sm" onclick="currentPostId=null;renderReview()">← Voltar</button>
        <div class="page-title" style="font-size:22px;margin:0">✏️ Revisar Post</div>
      </div>
      <div class="grid grid-2">
        <div>
          <div class="card">
            <h3>📸 Preview</h3>
            <div style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:8px">${escPost(post.ai_description)}</div>
          </div>
          <div class="card">
            <h3>📝 Legenda (edite se quiser)</h3>
            <textarea id="edit-caption" rows="4">${escPost(post.final_caption || post.ai_caption)}</textarea>
            <label>CTA</label>
            <input type="text" id="edit-cta" value="${escPost(post.final_cta || post.ai_cta)}">
            <label>Hashtags (separadas por vírgula)</label>
            <input type="text" id="edit-hashtags" value="${escPost(post.final_hashtags || post.ai_hashtags)}">
          </div>
        </div>
        <div>
          <div class="card">
            <h3>📅 Agendamento</h3>
            <label>Data e hora</label>
            <input type="datetime-local" id="edit-schedule">
            <label>Categoria</label>
            <select id="edit-category">
              <option value="look" ${(post.final_category || post.ai_category) === 'look' ? 'selected' : ''}>Look</option>
              <option value="novidade" ${(post.final_category || post.ai_category) === 'novidade' ? 'selected' : ''}>Novidade</option>
              <option value="promocao" ${(post.final_category || post.ai_category) === 'promocao' ? 'selected' : ''}>Promoção</option>
              <option value="dica" ${(post.final_category || post.ai_category) === 'dica' ? 'selected' : ''}>Dica</option>
            </select>
            <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
              <button class="btn btn-primary" onclick="approvePost('${esc(postId)}')">✅ Aprovar e Agendar</button>
              <button class="btn btn-danger" onclick="discardPost('${esc(postId)}')">🗑️ Descartar</button>
            </div>
          </div>
          <div class="card">
            <h3>🤖 Conteúdo Original da IA</h3>
            <div style="font-size:13px;color:rgba(255,255,255,.6);line-height:1.5;margin-bottom:8px">
              <strong>Legenda:</strong> ${escPost(post.ai_caption)}<br>
              <strong>CTA:</strong> ${escPost(post.ai_cta)}<br>
              <strong>Hashtags:</strong> ${escPost(post.ai_hashtags)}<br>
              <strong>Categoria:</strong> ${escPost(post.ai_category)}
            </div>
          </div>
        </div>
      </div>
    `;
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">❌</div>Erro: ${esc(e.message)}</div>`;
  }
}

async function approvePost(postId) {
  const scheduledAt = document.getElementById('edit-schedule').value;
  if (!scheduledAt) { toast('Selecione data e hora do agendamento', 'error'); return; }
  const dt = new Date(scheduledAt);
  const iso = dt.getFullYear() + '-' +
    String(dt.getMonth()+1).padStart(2,'0') + '-' +
    String(dt.getDate()).padStart(2,'0') + 'T' +
    String(dt.getHours()).padStart(2,'0') + ':' +
    String(dt.getMinutes()).padStart(2,'0') + ':00' + '-03:00';
  try {
    await api('/api/posts/' + postId + '/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        final_caption: document.getElementById('edit-caption').value,
        final_cta: document.getElementById('edit-cta').value,
        final_hashtags: document.getElementById('edit-hashtags').value,
        final_category: document.getElementById('edit-category').value,
        scheduled_at: iso,
        final_template_id: ''
      })
    });
    toast('✅ Post agendado com sucesso!', 'success');
    currentPostId = null;
    navigate('schedule');
  } catch(e) {
    toast('Erro: ' + e.message, 'error');
  }
}

async function discardPost(postId) {
  if (!confirm('Descartar este post?')) return;
  try {
    await api('/api/posts/' + postId, { method: 'DELETE' });
    toast('🗑️ Post descartado', 'info');
    currentPostId = null;
    renderReview();
  } catch(e) {
    toast('Erro: ' + e.message, 'error');
  }
}

// ───── Schedule Page ─────
async function renderSchedule() {
  const el = document.getElementById('page-schedule');
  el.innerHTML = `<div class="page-title">📅 Agenda</div><div class="page-subtitle">Posts agendados</div><div class="loading"><div class="spinner"></div></div>`;
  try {
    const data = await api('/api/posts/?status=agendado');
    const posts = data.posts || [];
    if (!posts.length) {
      el.innerHTML = `<div class="page-title">📅 Agenda</div><div class="page-subtitle">Posts agendados</div><div class="empty-state"><div class="icon">📅</div>Nenhum post agendado</div>`;
      return;
    }
    posts.sort((a,b) => (a.scheduled_at||'').localeCompare(b.scheduled_at||''));
    let html = `<div class="page-title">📅 Agenda</div><div class="page-subtitle">${posts.length} post(s) agendados</div>`;
    posts.forEach(p => {
      const dt = p.scheduled_at ? new Date(p.scheduled_at).toLocaleString('pt-BR') : '—';
      html += `<div class="card post-card">
        <div class="post-header">
          <span class="status-dot agendado"></span>
          <span class="post-title">${esc((p.final_caption || p.ai_caption || '').substring(0, 60))}...</span>
          <span class="badge badge-agendado">${dt}</span>
        </div>
        <div class="post-meta">${p.price ? 'R$ ' + p.price.toFixed(2) : ''} ${p.sizes ? '· ' + esc(p.sizes) : ''}</div>
        <button class="btn btn-danger btn-sm" onclick="cancelPost('${esc(p.id)}')" style="margin-top:8px">Cancelar</button>
      </div>`;
    });
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">❌</div>Erro: ${esc(e.message)}</div>`;
  }
}

async function cancelPost(postId) {
  if (!confirm('Cancelar este agendamento?')) return;
  try {
    await api('/api/posts/' + postId + '/cancel', { method: 'POST' });
    toast('Agendamento cancelado', 'info');
    renderSchedule();
  } catch(e) {
    toast('Erro: ' + e.message, 'error');
  }
}

// ───── Published Page ─────
async function renderPublished() {
  const el = document.getElementById('page-published');
  el.innerHTML = `<div class="page-title">✅ Publicados</div><div class="page-subtitle">Histórico de posts publicados</div><div class="loading"><div class="spinner"></div></div>`;
  try {
    const data = await api('/api/posts/?status=publicado');
    const posts = data.posts || [];
    if (!posts.length) {
      el.innerHTML = `<div class="page-title">✅ Publicados</div><div class="page-subtitle">Histórico de posts publicados</div><div class="empty-state"><div class="icon">📸</div>Nenhum post publicado ainda</div>`;
      return;
    }
    let html = `<div class="page-title">✅ Publicados</div><div class="page-subtitle">${posts.length} post(s) publicados</div>`;
    posts.forEach(p => {
      const dt = p.published_at ? new Date(p.published_at).toLocaleString('pt-BR') : '—';
      html += `<div class="card post-card">
        <div class="post-header">
          <span class="status-dot publicado"></span>
          <span class="post-title">${esc((p.final_caption || p.ai_caption || '').substring(0, 80))}...</span>
          <span class="badge badge-publicado">${dt}</span>
        </div>
      </div>`;
    });
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">❌</div>Erro: ${esc(e.message)}</div>`;
  }
}

// ───── Settings Page ─────
async function renderSettings() {
  const el = document.getElementById('page-settings');
  el.innerHTML = `<div class="page-title">⚙️ Configurações</div><div class="page-subtitle">Gerencie sua loja e integrações</div><div class="loading"><div class="spinner"></div></div>`;
  try {
    const s = await api('/api/settings/');
    el.innerHTML = `
      <div class="page-title">⚙️ Configurações</div>
      <div class="page-subtitle">Gerencie sua loja e integrações</div>
      <div class="tabs">
        <div class="tab active" onclick="settingsTab(this,'loja')">🏪 Loja</div>
        <div class="tab" onclick="settingsTab(this,'ia')">🤖 IA</div>
        <div class="tab" onclick="settingsTab(this,'instagram')">📱 Instagram</div>
      </div>
      <div id="settings-loja">
        <div class="card">
          <h3>🏪 Dados da Loja</h3>
          <label>Nome da Loja</label>
          <input type="text" id="s-store-name" value="${esc(s.store_name || 'Minha Loja')}">
          <label>Tom de Voz</label>
          <select id="s-brand-voice">
            <option value="amigavel" ${s.brand_voice === 'amigavel' ? 'selected' : ''}>Amigável</option>
            <option value="sofisticado" ${s.brand_voice === 'sofisticado' ? 'selected' : ''}>Sofisticado</option>
            <option value="divertido" ${s.brand_voice === 'divertido' ? 'selected' : ''}>Divertido</option>
            <option value="formal" ${s.brand_voice === 'formal' ? 'selected' : ''}>Formal</option>
          </select>
          <button class="btn btn-primary btn-sm" onclick="saveStore()">💾 Salvar</button>
        </div>
      </div>
      <div id="settings-ia" class="hidden">
        <div class="card">
          <h3>🤖 Inteligência Artificial</h3>
          <p style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:12px">Use OpenRouter (Gemini Flash grátis) para análise de imagens na nuvem.</p>
          <label>OpenRouter API Key</label>
          <input type="password" id="s-openrouter-key" value="${s.openrouter_key ? '****' : ''}" placeholder="sk-or-v1-...">
          <button class="btn btn-primary btn-sm" onclick="saveIA()">💾 Salvar</button>
        </div>
      </div>
      <div id="settings-instagram" class="hidden">
        <div class="card">
          <h3>📱 Instagram</h3>
          <label>Meta App ID</label>
          <input type="text" id="s-meta-app-id" value="${esc(s.meta_app_id)}">
          <label>Meta App Secret</label>
          <input type="password" id="s-meta-app-secret" value="${s.meta_app_secret ? '****' : ''}">
          <label>Access Token</label>
          <input type="password" id="s-meta-token" value="${s.meta_access_token ? '****' : ''}">
          <label>Instagram Business Account ID</label>
          <input type="text" id="s-meta-ig-id" value="${esc(s.meta_ig_user_id)}">
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-primary btn-sm" onclick="saveMeta()">💾 Salvar</button>
            <button class="btn btn-secondary btn-sm" onclick="testMeta()">🔗 Testar</button>
          </div>
        </div>
      </div>
    `;
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">❌</div>Erro: ${esc(e.message)}</div>`;
  }
}

function settingsTab(el, tab) {
  document.querySelectorAll('#page-settings .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('[id^="settings-"]').forEach(s => s.classList.add('hidden'));
  document.getElementById('settings-' + tab).classList.remove('hidden');
}

async function saveStore() {
  try {
    await api('/api/settings/', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({key:'store_name', value: document.getElementById('s-store-name').value}) });
    await api('/api/settings/', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({key:'brand_voice', value: document.getElementById('s-brand-voice').value}) });
    toast('✅ Dados da loja salvos!', 'success');
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

async function saveIA() {
  const key = document.getElementById('s-openrouter-key').value;
  if (!key || key === '****') { toast('Chave não alterada', 'info'); return; }
  try {
    await api('/api/settings/', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({key:'openrouter_key', value: key}) });
    toast('✅ Chave OpenRouter salva!', 'success');
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

async function saveMeta() {
  try {
    const fields = [
      ['meta_app_id', document.getElementById('s-meta-app-id').value],
      ['meta_app_secret', document.getElementById('s-meta-app-secret').value],
      ['meta_ig_user_id', document.getElementById('s-meta-ig-id').value],
    ];
    const token = document.getElementById('s-meta-token').value;
    if (token && token !== '****') fields.push(['meta_access_token', token]);
    for (const [k, v] of fields) {
      await api('/api/settings/', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({key:k, value:v}) });
    }
    toast('✅ Configurações Meta salvas!', 'success');
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

async function testMeta() {
  try {
    const r = await api('/api/meta/test', { method: 'POST' });
    toast(r.message || 'Conectado!', 'success');
  } catch(e) { toast('Falha: ' + e.message, 'error'); }
}
</script>
</body>
